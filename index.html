<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Player</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>
    <div class="ambient" aria-hidden="true"></div>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path
          d="M20 12a8 8 0 1 1-2.35-5.67"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M20 4v6h-6"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path
          d="M5 12.5l4.2 4.2L19 7"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path
          d="M12 3.8 21 20H3l9-16.2z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"
        />
        <path d="M12 9v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <circle cx="12" cy="17.2" r="1.2" fill="currentColor" />
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M8 5.5 19 12 8 18.5z" fill="currentColor" />
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <rect x="7" y="5.2" width="4" height="13.6" rx="1.4" fill="currentColor" />
        <rect x="13" y="5.2" width="4" height="13.6" rx="1.4" fill="currentColor" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle
          cx="11"
          cy="11"
          r="6.5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <path d="M16 16 21 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path
          d="M6 6 18 18M18 6 6 18"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
        />
      </symbol>
    </svg>

    <main class="app">
      <section class="layout">
        <section class="playlist panel">
          <div class="playlist-head">
            <h2 class="playlist-title">歌单</h2>
            <div class="playlist-tools">
              <button
                id="search-btn"
                class="icon-btn"
                type="button"
                aria-label="搜索歌曲"
                title="搜索歌曲"
                aria-expanded="false"
                aria-controls="search-box"
              >
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-search"></use>
                </svg>
              </button>
              <button id="refresh-btn" class="icon-btn" type="button" aria-label="刷新列表" title="刷新列表">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                  <use href="#icon-refresh"></use>
                </svg>
              </button>
            </div>
          </div>
          <div id="search-box" class="search-box" aria-hidden="true">
            <input id="search-input" type="search" placeholder="搜索歌曲名或路径..." autocomplete="off" />
          </div>
          <ul id="track-list"></ul>
        </section>

        <section class="player panel">
          <p id="now-playing" class="now-playing">当前未选择歌曲</p>
          <audio id="audio-player" preload="metadata"></audio>

          <div class="controls">
            <button id="backward" type="button">-5 秒</button>
            <button
              id="play-pause"
              type="button"
              class="primary transport-btn"
              aria-label="播放"
              title="播放 / 暂停"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-play"></use>
              </svg>
            </button>
            <button id="forward" type="button">+5 秒</button>
          </div>

          <p id="time" class="time">00:00 / 00:00</p>

          <div class="speed-box">
            <div class="speed-row">
              <span>速度</span>
              <span id="speed-label" class="speed-label">100%</span>
            </div>

            <input
              id="speed-slider"
              type="range"
              min="50"
              max="150"
              step="1"
              value="100"
              aria-label="播放速度"
            />

            <div id="preset-speeds" class="preset-speeds">
              <button type="button" data-percent="80">80%</button>
              <button type="button" data-percent="85">85%</button>
              <button type="button" data-percent="90">90%</button>
              <button type="button" data-percent="100">100%</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
